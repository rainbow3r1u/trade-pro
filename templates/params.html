<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V7 策略参数面板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e17; color: #c9d1d9; font-family: 'Courier New', monospace; padding: 20px; }
h1 { color: #58a6ff; font-size: 1.5em; margin-bottom: 5px; }
.sub { color: #8b949e; font-size: 0.85em; margin-bottom: 20px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
.card h2 { color: #58a6ff; font-size: 1.1em; margin-bottom: 12px; border-bottom: 1px solid #30363d; padding-bottom: 8px; }
.row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #21262d; }
.row:last-child { border-bottom: none; }
.label { color: #8b949e; }
.value { color: #f0883e; font-weight: bold; }
.value.green { color: #3fb950; }
.value.red { color: #f85149; }
.value.highlight { color: #58a6ff; }
.status-bar { display: flex; gap: 20px; margin-bottom: 20px; }
.status-item { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 10px 16px; flex: 1; }
.status-item .num { font-size: 1.4em; font-weight: bold; color: #3fb950; }
.status-item .lbl { font-size: 0.8em; color: #8b949e; }
</style>
</head>
<body>
<h1>V7 混合策略参数面板</h1>
<div class="sub">openclaw / 回测引擎 v7 / 实盘部署 | <a href="/" style="color:#58a6ff;">← 返回监控</a> | <a href="/momentum" style="color:#ff9500;">追涨追踪器</a> | <a href="/backtest" style="color:#3fb950;">回测引擎</a> | <a href="/bb_diagnostic" style="color:#d2991d;">BB诊断</a></div>

<div class="status-bar" id="statusBar"></div>

<div class="grid">
    <div class="card">
        <h2>📈 现货参数 (BB日线)</h2>
        <div id="spotParams"></div>
    </div>
    <div class="card">
        <h2>⚡ 合约参数 (VOL_SURGE)</h2>
        <div id="futParams"></div>
    </div>
    <div class="card">
        <h2>🛡️ 风控参数</h2>
        <div id="riskParams"></div>
    </div>
    <div class="card">
        <h2>📊 BB检测参数 (monitor)</h2>
        <div id="bbParams"></div>
    </div>
</div>

<script>
const API = '';

function row(label, value, cls = '') {
    return `<div class="row"><span class="label">${label}</span><span class="value ${cls}">${value}</span></div>`;
}

function statusItem(num, lbl, cls='') {
    return `<div class="status-item"><div class="num ${cls}">${num}</div><div class="lbl">${lbl}</div></div>`;
}

async function refresh() {
    try {
        // Params via debug state
        let resp = await fetch(API + '/api/debug_state');
        let state = await resp.json();

        let hkc = state.hourly_kline_cache || {};
        let bbBackfill = state.bb_backfill_done;
        let symbols = Object.keys(state.symbols || {}).length;

        document.getElementById('statusBar').innerHTML =
            statusItem(symbols, '监控币种') +
            statusItem(Object.keys(hkc).length, '1h缓存币种') +
            statusItem(bbBackfill ? '✅' : '⏳', '数据就绪') +
            statusItem(new Date().toLocaleTimeString('zh-CN', {hour12:false}), '刷新时间', 'highlight');

        // BB心跳检测
        try {
            let bbResp = await fetch(API + '/api/bollinger_climb_daily');
            let bbData = await bbResp.json();
            let bbAge = (Date.now()/1000) - (bbData.updated_at || 0);
            let bbAlive = bbAge < 90000;  // BB每天UTC 00:05刷新一次, 25h超时
            document.getElementById('statusBar').innerHTML +=
                statusItem(bbAlive ? '✅' : '❌', 'BB心跳', bbAlive ? '' : 'red');
        } catch(e) {
            document.getElementById('statusBar').innerHTML +=
                statusItem('❌', 'BB掉线', 'red');
        }

        // Static params (from sim_trade.py v7)
        document.getElementById('spotParams').innerHTML =
            row('初始资金', '100 USDT') +
            row('每单金额', '5 USDT') +
            row('最大持仓', '20个') +
            row('手续费', '0.1%') +
            row('止盈', '2x买入价（100%）') +
            row('止损', '跌破日线布林下轨') +
            row('BB周期', '30天') +
            row('BB标准差', '2.5x') +
            row('最低连续天数', '4天') +
            row('HL窗口', '5根') +
            row('HL最少个数', '3个') +
            row('日涨幅过滤', '10%') +
            row('24h成交量门槛', '100万 USDT');

        document.getElementById('futParams').innerHTML =
            row('初始资金', '100 USDT') +
            row('保证金/单', '20 USDT') +
            row('杠杆', '10x') +
            row('最大持仓', '20个（受现货约束）') +
            row('手续费', '0.04%') +
            row('止盈', '保证金50%（价格5%）') +
            row('止损', '开仓价2%') +
            row('VOL_SURGE倍率', '4.0x', 'highlight') +
            row('15m均量下限', '5,000 USDT') +
            row('24h成交量门槛', '100万 USDT');

        document.getElementById('riskParams').innerHTML =
            row('日止盈次数上限', '4次', 'highlight') +
            row('日涨幅过滤（合约）', '10%') +
            row('双阴过滤', '3根1h ≥2根阴线') +
            row('阴阳质检', '✅ 开仓前检查') +
            row('止损冷却', '30分钟') +
            row('满仓替换', 'VS ratio≥5.0时触发') +
            row('联合爆仓', '总权益≤0强平') +
            row('SURGE大单策略', '❌ 已禁用', 'red') +
            row('日止盈两次过滤', '✅ 启用') +
            row('BB耗尽阈值', 'VS止盈≥15次→标记耗尽') +
            row('BB耗尽全平', '全部耗尽→平仓');

        document.getElementById('bbParams').innerHTML =
            row('布林周期', '30') +
            row('标准差倍数', '2.5') +
            row('上轨容差', '±8%') +
            row('量能比率', '1.2x') +
            row('HL窗口', '5') +
            row('HL最少个数', '3') +
            row('ATR周期', '14') +
            row('ATR过滤', '✅ 启用') +
            row('检测间隔', '30秒（日线BB）') +
            row('排除币种', '27个（BTC/ETH/SOL/股票/商品/稳定币）');
    } catch(e) {
        document.getElementById('statusBar').innerHTML = '<span style="color:#f85149">连接失败，等待monitor就绪...</span>';
    }
}

refresh();
setInterval(refresh, 15000);
</script>
</body>
</html>
