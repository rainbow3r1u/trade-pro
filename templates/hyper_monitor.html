<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyperliquid 大币逐笔监控</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            background: #0a0e1a;
            color: #e0e0e0;
            padding: 20px;
        }
        h1 {
            color: #00d4aa;
            font-size: 20px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .subtitle {
            color: #666;
            font-size: 12px;
            margin-bottom: 20px;
        }
        .status-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #888;
        }
        .status-bar span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #333;
        }
        .dot.connected { background: #00d4aa; box-shadow: 0 0 6px #00d4aa; }
        .dot.disconnected { background: #ff4444; }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .card {
            background: #111827;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #1e293b;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .coin-name {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
        }
        .price {
            font-size: 16px;
            font-family: monospace;
            color: #00d4aa;
        }
        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 12px;
        }
        .metric {
            background: #0f172a;
            padding: 8px 10px;
            border-radius: 8px;
        }
        .metric-label {
            color: #64748b;
            margin-bottom: 2px;
        }
        .metric-value {
            font-family: monospace;
            font-size: 14px;
        }
        .buy { color: #00d4aa; }
        .sell { color: #ff6b6b; }
        .neutral { color: #94a3b8; }

        .buy-ratio-bar {
            height: 6px;
            background: #1e293b;
            border-radius: 3px;
            margin-top: 12px;
            overflow: hidden;
            position: relative;
        }
        .buy-ratio-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4aa, #00b894);
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        .buy-ratio-text {
            text-align: center;
            font-size: 11px;
            color: #94a3b8;
            margin-top: 6px;
        }

        .trades-section {
            margin-top: 24px;
        }
        .section-title {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            background: #111827;
            border-radius: 12px;
            overflow: hidden;
        }
        th, td {
            padding: 10px 12px;
            text-align: right;
        }
        th {
            background: #0f172a;
            color: #64748b;
            font-weight: normal;
            text-align: right;
        }
        tr {
            border-bottom: 1px solid #1e293b;
        }
        tr:last-child { border-bottom: none; }
        td:first-child, th:first-child { text-align: left; }

        .highlight-buy { color: #00d4aa; }
        .highlight-sell { color: #ff6b6b; }

        .update-time {
            position: fixed;
            bottom: 10px;
            right: 16px;
            font-size: 11px;
            color: #475569;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .updating {
            animation: pulse 0.3s ease;
        }
    </style>
</head>
<body>
    <h1>
        <span>⚡</span>
        Hyperliquid 大币逐笔监控
    </h1>
    <div class="subtitle">BTC · ETH · SOL · BNB | 逐笔成交 · 真实买卖方向 · 分钟聚合</div>

    <div class="status-bar">
        <span><span class="dot" id="ws-dot"></span>WebSocket <span id="ws-status">连接中...</span></span>
        <span>总成交笔数: <b id="total-trades">0</b></span>
        <span>上次成交: <span id="last-trade">-</span></span>
    </div>

    <div class="cards" id="cards"></div>

    <div class="trades-section">
        <div class="section-title">📊 最近完整分钟K线</div>
        <table>
            <thead>
                <tr>
                    <th>币种</th>
                    <th>时间</th>
                    <th>开盘</th>
                    <th>最高</th>
                    <th>最低</th>
                    <th>收盘</th>
                    <th>成交笔</th>
                    <th>买入额</th>
                    <th>卖出额</th>
                    <th>买入比</th>
                </tr>
            </thead>
            <tbody id="kline-tbody"></tbody>
        </table>
    </div>

    <div class="update-time" id="update-time"></div>

    <script>
        const socket = io();
        const symbols = ['BTCUSDT', 'ETHUSDT', 'SOLUSDT', 'BNBUSDT'];
        const coinNames = {'BTCUSDT': 'BTC', 'ETHUSDT': 'ETH', 'SOLUSDT': 'SOL', 'BNBUSDT': 'BNB'};
        let currentData = {};
        let lastKlines = [];

        // 初始化卡片
        function initCards() {
            const container = document.getElementById('cards');
            symbols.forEach(sym => {
                const div = document.createElement('div');
                div.className = 'card';
                div.id = `card-${sym}`;
                div.innerHTML = `
                    <div class="card-header">
                        <span class="coin-name">${coinNames[sym]}</span>
                        <span class="price" id="price-${sym}">-</span>
                    </div>
                    <div class="metrics">
                        <div class="metric">
                            <div class="metric-label">买入额</div>
                            <div class="metric-value buy" id="buy-q-${sym}">-</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">卖出额</div>
                            <div class="metric-value sell" id="sell-q-${sym}">-</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">成交笔数</div>
                            <div class="metric-value neutral" id="n-${sym}">-</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">分钟进度</div>
                            <div class="metric-value neutral" id="elapsed-${sym}">-</div>
                        </div>
                    </div>
                    <div class="buy-ratio-bar">
                        <div class="buy-ratio-fill" id="ratio-bar-${sym}" style="width: 50%"></div>
                    </div>
                    <div class="buy-ratio-text" id="ratio-text-${sym}">买入比: 50%</div>
                `;
                container.appendChild(div);
            });
        }

        function formatNum(n, digits=2) {
            if (n === undefined || n === null) return '-';
            if (n >= 1e6) return (n / 1e6).toFixed(digits) + 'M';
            if (n >= 1e3) return (n / 1e3).toFixed(digits) + 'K';
            return n.toFixed(digits);
        }

        function formatTime(ts) {
            const d = new Date(ts * 1000);
            return d.toLocaleTimeString('zh-CN', {hour12: false});
        }

        function updateCards(klines) {
            klines.forEach(k => {
                const sym = k.symbol;
                currentData[sym] = k;

                const priceEl = document.getElementById(`price-${sym}`);
                if (priceEl) priceEl.textContent = formatNum(k.c, k.c > 1000 ? 1 : 2);

                const buyQEl = document.getElementById(`buy-q-${sym}`);
                if (buyQEl) buyQEl.textContent = '$' + formatNum(k.buy_q);

                const sellQEl = document.getElementById(`sell-q-${sym}`);
                if (sellQEl) sellQEl.textContent = '$' + formatNum(k.sell_q);

                const nEl = document.getElementById(`n-${sym}`);
                if (nEl) nEl.textContent = k.n?.toLocaleString() || '-';

                const elapsedEl = document.getElementById(`elapsed-${sym}`);
                if (elapsedEl) elapsedEl.textContent = (k.elapsed || 0) + 's';

                const ratio = k.buy_ratio || 0.5;
                const bar = document.getElementById(`ratio-bar-${sym}`);
                if (bar) bar.style.width = (ratio * 100).toFixed(1) + '%';

                const text = document.getElementById(`ratio-text-${sym}`);
                if (text) {
                    const emoji = ratio >= 0.7 ? '🟢' : ratio <= 0.3 ? '🔴' : '⚪';
                    text.textContent = `${emoji} 买入比: ${(ratio * 100).toFixed(1)}%`;
                }

                // 闪烁动画
                const card = document.getElementById(`card-${sym}`);
                if (card) {
                    card.classList.add('updating');
                    setTimeout(() => card.classList.remove('updating'), 300);
                }
            });
        }

        function updateKlineTable(klines) {
            // 合并新K线，去重
            klines.forEach(k => {
                const idx = lastKlines.findIndex(x => x.symbol === k.symbol && x.t === k.t);
                if (idx >= 0) {
                    lastKlines[idx] = k;
                } else {
                    lastKlines.push(k);
                }
            });
            // 保留最近30条
            lastKlines.sort((a, b) => b.t - a.t || a.symbol.localeCompare(b.symbol));
            lastKlines = lastKlines.slice(0, 30);

            const tbody = document.getElementById('kline-tbody');
            tbody.innerHTML = lastKlines.map(k => {
                const ratio = k.buy_ratio || 0.5;
                const ratioClass = ratio >= 0.7 ? 'highlight-buy' : ratio <= 0.3 ? 'highlight-sell' : 'neutral';
                return `
                    <tr>
                        <td><b>${coinNames[k.symbol] || k.symbol}</b></td>
                        <td>${formatTime(k.t)}</td>
                        <td>${formatNum(k.o)}</td>
                        <td>${formatNum(k.h)}</td>
                        <td>${formatNum(k.l)}</td>
                        <td>${formatNum(k.c)}</td>
                        <td>${k.n?.toLocaleString() || '-'}</td>
                        <td class="highlight-buy">$${formatNum(k.buy_q)}</td>
                        <td class="highlight-sell">$${formatNum(k.sell_q)}</td>
                        <td class="${ratioClass}">${(ratio * 100).toFixed(1)}%</td>
                    </tr>
                `;
            }).join('');
        }

        // Socket.IO 事件
        socket.on('connect', () => {
            document.getElementById('ws-dot').className = 'dot connected';
            document.getElementById('ws-status').textContent = '已连接';
        });

        socket.on('disconnect', () => {
            document.getElementById('ws-dot').className = 'dot disconnected';
            document.getElementById('ws-status').textContent = '已断开';
        });

        socket.on('current_state', (data) => {
            if (data.klines) updateCards(data.klines);
            if (data.stats) {
                document.getElementById('total-trades').textContent = data.stats.total_trades?.toLocaleString() || '0';
                const last = data.stats.last_trade_at;
                document.getElementById('last-trade').textContent = last ? Math.floor(Date.now()/1000 - last) + 's前' : '-';
            }
            document.getElementById('update-time').textContent = '更新: ' + new Date().toLocaleTimeString('zh-CN');
        });

        socket.on('minute_kline', (data) => {
            if (data.klines) {
                updateKlineTable(data.klines);
            }
        });

        // 初始化
        initCards();

        // 拉取初始历史K线
        fetch('/api/klines?n=20')
            .then(r => r.json())
            .then(d => {
                if (d.data) updateKlineTable(d.data);
            });
    </script>
</body>
</html>
